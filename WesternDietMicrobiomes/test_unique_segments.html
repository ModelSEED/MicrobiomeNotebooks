<!DOCTYPE html>
<html>
<head>
    <title>Unique Segment IDs Test</title>
    <script src="https://d3js.org/d3.v4.min.js"></script>
    <script src="escher.min.js"></script>
    <style>
        html, body { margin: 0; padding: 0; width: 100%; height: 100%; }
        #map-container { width: 100%; height: 100%; position: absolute; top: 0; left: 0; }
        #log { position: fixed; top: 10px; left: 10px; background: white; padding: 10px; z-index: 9999; font-family: monospace; font-size: 11px; border: 1px solid #ccc; }
    </style>
</head>
<body>
    <div id="log"></div>
    <div id="map-container"></div>
    <script>
        function log(msg) {
            document.getElementById('log').innerHTML += msg + '<br>';
        }

        // Two reactions with GLOBALLY UNIQUE segment IDs
        var mapData = [
            {
                "map_name": "Unique Segments",
                "map_id": "test789",
                "map_description": "Two reactions with unique segment IDs",
                "homepage": "https://escher.github.io",
                "schema": "https://escher.github.io/escher/jsonschema/1-0-0#"
            },
            {
                "reactions": {
                    "0": {
                        "name": "Rxn1",
                        "bigg_id": "rxn1",
                        "reversibility": false,
                        "label_x": 300,
                        "label_y": 300,
                        "gene_reaction_rule": "",
                        "genes": [],
                        "metabolites": [
                            {"bigg_id": "A", "coefficient": -1.0},
                            {"bigg_id": "B", "coefficient": 1.0}
                        ],
                        "segments": {
                            "0": {"from_node_id": "0", "to_node_id": "1", "b1": null, "b2": null},
                            "1": {"from_node_id": "2", "to_node_id": "1", "b1": null, "b2": null},
                            "2": {"from_node_id": "0", "to_node_id": "3", "b1": {"x": 250, "y": 290}, "b2": {"x": 150, "y": 200}},
                            "3": {"from_node_id": "2", "to_node_id": "4", "b1": {"x": 350, "y": 330}, "b2": {"x": 450, "y": 400}}
                        }
                    },
                    "1": {
                        "name": "Rxn2",
                        "bigg_id": "rxn2",
                        "reversibility": false,
                        "label_x": 700,
                        "label_y": 300,
                        "gene_reaction_rule": "",
                        "genes": [],
                        "metabolites": [
                            {"bigg_id": "C", "coefficient": -1.0},
                            {"bigg_id": "D", "coefficient": 1.0}
                        ],
                        "segments": {
                            "100": {"from_node_id": "5", "to_node_id": "6", "b1": null, "b2": null},
                            "101": {"from_node_id": "7", "to_node_id": "6", "b1": null, "b2": null},
                            "102": {"from_node_id": "5", "to_node_id": "8", "b1": {"x": 650, "y": 290}, "b2": {"x": 550, "y": 200}},
                            "103": {"from_node_id": "7", "to_node_id": "9", "b1": {"x": 750, "y": 330}, "b2": {"x": 850, "y": 400}}
                        }
                    }
                },
                "nodes": {
                    "0": {"node_type": "multimarker", "x": 280, "y": 300},
                    "1": {"node_type": "midmarker", "x": 300, "y": 300},
                    "2": {"node_type": "multimarker", "x": 320, "y": 300},
                    "3": {"node_type": "metabolite", "x": 100, "y": 150, "bigg_id": "A", "name": "A", "label_x": 110, "label_y": 140, "node_is_primary": true},
                    "4": {"node_type": "metabolite", "x": 500, "y": 450, "bigg_id": "B", "name": "B", "label_x": 510, "label_y": 440, "node_is_primary": true},
                    "5": {"node_type": "multimarker", "x": 680, "y": 300},
                    "6": {"node_type": "midmarker", "x": 700, "y": 300},
                    "7": {"node_type": "multimarker", "x": 720, "y": 300},
                    "8": {"node_type": "metabolite", "x": 500, "y": 150, "bigg_id": "C", "name": "C", "label_x": 510, "label_y": 140, "node_is_primary": true},
                    "9": {"node_type": "metabolite", "x": 900, "y": 450, "bigg_id": "D", "name": "D", "label_x": 910, "label_y": 440, "node_is_primary": true}
                },
                "text_labels": {},
                "canvas": {"x": -200, "y": -200, "width": 1200, "height": 800}
            }
        ];

        log('Nodes: ' + Object.keys(mapData[1].nodes).length);
        log('Reactions: ' + Object.keys(mapData[1].reactions).length);

        try {
            var builder = escher.Builder(mapData, null, null,
                d3.select('#map-container'), {
                    menu: 'all',
                    fill_screen: true
                });
            log('Builder.map: ' + (builder.map ? 'exists' : 'undefined'));

            if (builder.map) {
                setTimeout(function() { builder.map.zoom_extent_canvas(); }, 500);
            }
        } catch (e) {
            log('Error: ' + e.message);
            console.error(e);
        }
    </script>
</body>
</html>
